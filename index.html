<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة مشاريع أودو | Odoo Project Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Libraries -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        window.fb = { initializeApp, getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        input, select { outline: none; transition: all 0.2s; }
        input:focus { ring: 2px; ring-color: #4f46e5; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icon Component Wrapper to fix Lucide Errors ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Configuration & Structure ---
        const BASE_TASKS = [
            { id: 'pm', category: 'إدارة', label: 'إدارة المشروع', role: 'PM', base: 10 },
            { id: 'sales', category: 'مبيعات', label: 'عمولة المبيعات', role: 'Sales', base: 10 },
            { id: 'req', category: 'وظيفي', label: 'تحليل المتطلبات', role: 'Functional', base: 8 },
            { id: 'config', category: 'وظيفي', label: 'الإعدادات الأساسية', role: 'Functional', base: 12 },
            { id: 'data', category: 'وظيفي', label: 'ترحيل البيانات', role: 'Functional', base: 8 },
            { id: 'reports', category: 'وظيفي', label: 'التقارير والنماذج', role: 'Functional', base: 4 },
            { id: 'security', category: 'وظيفي', label: 'الأمان والصلاحيات', role: 'Functional', base: 4 },
            { id: 'training', category: 'وظيفي', label: 'التدريب والدعم', role: 'Functional', base: 4 },
            { id: 'modules', category: 'تقني', label: 'تطوير موديولات (Python)', role: 'Developer', base: 20 },
            { id: 'integration', category: 'تقني', label: 'ربط أنظمة (Integration)', role: 'Developer', base: 20 },
        ];

        /**
         * تنبيه أمني: لا تضع مفتاح API حقيقي هنا في مستودع عام (Public Repository).
         * قم بتجديد المفتاح من Firebase Console واستخدم الخصائص أدناه.
         * يفضل استخدام إعدادات القيود (Restrictions) للمفتاح ليقتصر استخدامه على نطاق موقعك فقط.
         */
        const USER_FIREBASE_CONFIG = {
            apiKey: "", // ضع المفتاح الجديد هنا بعد التجديد
            authDomain: "odoo-manager-50db5.firebaseapp.com",
            projectId: "odoo-manager-50db5",
            storageBucket: "odoo-manager-50db5.firebasestorage.app",
            messagingSenderId: "32862208829",
            appId: "1:32862208829:web:65e752d7c4ebc785a8fb54",
            measurementId: "G-6LMJN75WEY"
        };

        const App = () => {
            const [projects, setProjects] = useState([]);
            const [user, setUser] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [loading, setLoading] = useState(true);
            const [setupError, setSetupError] = useState(null);

            // Form State
            const [newProject, setNewProject] = useState({
                name: '',
                client: '',
                value: 100000,
                type: 'Custom',
                tasks: BASE_TASKS.reduce((acc, t) => ({ ...acc, [t.id]: true }), {})
            });

            // Firebase Initialization
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const envConfigStr = typeof window.__firebase_config !== 'undefined' ? window.__firebase_config : null;
                        const envConfig = envConfigStr ? JSON.parse(envConfigStr) : null;
                        
                        // اختيار الإعدادات المتاحة
                        const firebaseConfig = (envConfig && envConfig.apiKey) ? envConfig : USER_FIREBASE_CONFIG;
                        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'odoo-manager-default';
                        
                        // فحص إذا كان المفتاح مفقوداً
                        if (!firebaseConfig.apiKey) {
                            setSetupError("يرجى وضع مفتاح API الجديد في ملف الكود index.html لتفعيل ميزات السحابة.");
                            setLoading(false);
                            return;
                        }

                        const app = fb.initializeApp(firebaseConfig);
                        const auth = fb.getAuth(app);
                        const db = fb.getFirestore(app);

                        // Auth Logic
                        const initialToken = typeof window.__initial_auth_token !== 'undefined' ? window.__initial_auth_token : null;
                        if (initialToken) {
                            await fb.signInWithCustomToken(auth, initialToken);
                        } else {
                            await fb.signInAnonymously(auth);
                        }
                        
                        fb.onAuthStateChanged(auth, (u) => {
                            setUser(u);
                            if (u) {
                                const q = fb.collection(db, 'artifacts', appId, 'public', 'data', 'projects');
                                fb.onSnapshot(q, (snapshot) => {
                                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                    setProjects(data);
                                    setLoading(false);
                                }, (err) => {
                                    console.error("Firestore Snapshot error:", err);
                                    setLoading(false);
                                });
                            }
                        });
                    } catch (err) {
                        console.error("Firebase Initialization Error:", err);
                        setLoading(false);
                        setSetupError("خطأ في الاتصال بخدمات السحابة. تأكد من صحة إعدادات Firebase.");
                    }
                };
                initFirebase();
            }, []);

            const calculateProjectSplit = (proj) => {
                let tempTasks = BASE_TASKS.map(t => {
                    let adjust = 0;
                    if (proj.type === 'Heavy') {
                        if (t.id === 'config') adjust = -2;
                        if (t.id === 'data') adjust = -3;
                        if (t.id === 'modules') adjust = 2;
                        if (t.id === 'integration') adjust = 3;
                    } else if (proj.type === 'Standard') {
                        if (t.id === 'modules') adjust = -2;
                        if (t.id === 'integration') adjust = -3;
                        if (t.id === 'config') adjust = 2;
                        if (t.id === 'req') adjust = 3;
                    }
                    
                    const finalPerc = proj.tasks[t.id] ? (t.base + adjust) : 0;
                    return {
                        ...t,
                        finalPerc,
                        amount: (proj.value * finalPerc) / 100
                    };
                });

                const roleTotals = tempTasks.reduce((acc, curr) => {
                    acc[curr.role] = (acc[curr.role] || 0) + curr.amount;
                    return acc;
                }, { 'PM': 0, 'Sales': 0, 'Functional': 0, 'Developer': 0 });

                return { tasks: tempTasks, roleTotals };
            };

            const handleSaveProject = async () => {
                if (!newProject.name || !user) return;
                const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'odoo-manager-default';
                
                try {
                    const db = fb.getFirestore();
                    await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'projects'), {
                        ...newProject,
                        createdBy: user.uid,
                        createdAt: new Date().toISOString()
                    });
                    setIsAdding(false);
                    setNewProject({ name: '', client: '', value: 100000, type: 'Custom', tasks: BASE_TASKS.reduce((acc, t) => ({ ...acc, [t.id]: true }), {}) });
                } catch (e) {
                    console.error("Save Error:", e);
                }
            };

            const deleteProject = async (id) => {
                if (!user) return;
                try {
                    const db = fb.getFirestore();
                    const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'odoo-manager-default';
                    await fb.deleteDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'projects', id));
                } catch (e) {
                    console.error("Delete Error:", e);
                }
            };

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-indigo-950 text-white">
                    <div className="text-center">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-white mx-auto mb-4"></div>
                        <p className="text-xl font-bold">جاري الاتصال بالسحابة...</p>
                    </div>
                </div>
            );

            if (setupError) return (
                <div className="flex h-screen items-center justify-center bg-slate-50 p-6">
                    <div className="max-w-md w-full bg-white p-8 rounded-[2.5rem] shadow-2xl border border-red-100 text-center">
                        <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                            <Icon name="alert-circle" size={40} />
                        </div>
                        <h2 className="text-2xl font-black text-slate-800 mb-4">تنبيه أمني وإعدادات</h2>
                        <p className="text-slate-500 mb-8 leading-relaxed font-bold">{setupError}</p>
                        <div className="bg-slate-50 p-4 rounded-2xl text-right text-xs text-slate-400 space-y-2 mb-6">
                            <p>1. اذهب لـ Firebase Console.</p>
                            <p>2. قم بتجديد (Regenerate) مفتاح الـ API.</p>
                            <p>3. ضعه في متغير USER_FIREBASE_CONFIG داخل الكود.</p>
                        </div>
                        <button onClick={() => window.location.reload()} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all">إعادة تحميل النظام</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50">
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 bg-indigo-950 text-white p-6 shadow-xl z-20 flex flex-col">
                        <div className="flex items-center gap-3 mb-10">
                            <div className="bg-white p-2 rounded-xl text-indigo-900 shadow-lg">
                                <Icon name="settings" size={24} />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight">Odoo OS</h1>
                        </div>
                        
                        <nav className="space-y-2 flex-1">
                            <button className="flex items-center gap-3 w-full p-3 rounded-xl bg-white/10 text-white transition-all font-bold text-right">
                                <Icon name="layout-dashboard" size={20} />
                                <span>لوحة التحكم</span>
                            </button>
                            <button className="flex items-center gap-3 w-full p-3 rounded-xl text-indigo-300 hover:bg-white/5 transition-all text-right">
                                <Icon name="users" size={20} />
                                <span>الشركاء</span>
                            </button>
                            <button className="flex items-center gap-3 w-full p-3 rounded-xl text-indigo-300 hover:bg-white/5 transition-all text-right">
                                <Icon name="briefcase" size={20} />
                                <span>العملاء</span>
                            </button>
                        </nav>

                        <div className="mt-auto pt-6 border-t border-indigo-800">
                            <p className="text-[10px] text-indigo-400 font-bold uppercase mb-2 tracking-widest">المستشار الحالي</p>
                            <div className="flex items-center gap-3 p-2 bg-indigo-900/50 rounded-xl border border-indigo-800">
                                <div className="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-xs font-bold text-white">O</div>
                                <div className="overflow-hidden text-right">
                                    <p className="text-[10px] font-bold truncate text-indigo-100">{user ? user.uid.substring(0, 15) : 'مستشار مجهول'}</p>
                                    <p className="text-[8px] text-indigo-400 font-bold uppercase">Cloud Connected</p>
                                </div>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-10">
                        <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
                            <div>
                                <h2 className="text-3xl font-black text-slate-800 leading-tight">إدارة مشاريع أودو</h2>
                                <p className="text-slate-500 font-medium mt-1">نظام حساب الأرباح وتوزيع المهام الذكي</p>
                            </div>
                            <button 
                                onClick={() => setIsAdding(true)}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl flex items-center gap-2 shadow-xl shadow-indigo-200 transition-all active:scale-95 font-bold"
                            >
                                <Icon name="plus" size={20} />
                                <span>مشروع جديد</span>
                            </button>
                        </header>

                        {/* Stats Summary */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex items-center gap-6 group hover:shadow-lg transition-all border-b-4 border-b-indigo-500">
                                <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform shadow-inner text-right">
                                    <Icon name="briefcase" size={28} />
                                </div>
                                <div className="text-right">
                                    <p className="text-slate-400 text-xs font-bold uppercase mb-1 tracking-wider">المشاريع</p>
                                    <p className="text-3xl font-black text-slate-800 tracking-tighter">{projects.length}</p>
                                </div>
                            </div>
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex items-center gap-6 group hover:shadow-lg transition-all border-b-4 border-b-emerald-500">
                                <div className="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform shadow-inner text-right">
                                    <Icon name="dollar-sign" size={28} />
                                </div>
                                <div className="text-right">
                                    <p className="text-slate-400 text-xs font-bold uppercase mb-1 tracking-wider">قيمة التعاقدات</p>
                                    <p className="text-3xl font-black text-emerald-600 tracking-tighter">${projects.reduce((s, p) => s + Number(p.value), 0).toLocaleString()}</p>
                                </div>
                            </div>
                            <div className="bg-indigo-600 p-8 rounded-[2.5rem] shadow-xl text-white flex items-center gap-6 group hover:translate-y-[-4px] transition-all relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16"></div>
                                <div className="w-14 h-14 bg-white/20 text-white rounded-2xl flex items-center justify-center z-10 text-right">
                                    <Icon name="zap" size={28} />
                                </div>
                                <div className="z-10 text-right">
                                    <p className="text-indigo-200 text-xs font-bold uppercase mb-1 tracking-wider">المشاريع النشطة</p>
                                    <p className="text-3xl font-black tracking-tighter">{projects.length}</p>
                                </div>
                            </div>
                        </div>

                        {/* Project List */}
                        <div className="space-y-6">
                            <div className="flex justify-between items-center px-2">
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <Icon name="layout-dashboard" size={22} className="text-indigo-600" />
                                    المشاريع الحالية بالسحابة
                                </h3>
                                <span className="text-[10px] bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full font-black uppercase">Live DB Connected</span>
                            </div>
                            
                            {projects.length === 0 && (
                                <div className="bg-white border-2 border-dashed border-slate-200 p-20 rounded-[3rem] text-center shadow-inner">
                                    <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                        <Icon name="alert-circle" size={40} className="text-slate-300" />
                                    </div>
                                    <p className="text-slate-400 font-bold text-lg">لا توجد مشاريع مسجلة في قاعدة البيانات حالياً.</p>
                                    <p className="text-slate-300 text-sm mt-2 font-bold italic">ابدأ بإضافة أول مشروع لمشاركته مع الفريق.</p>
                                </div>
                            )}

                            <div className="grid grid-cols-1 gap-8">
                                {projects.map(proj => {
                                    const analysis = calculateProjectSplit(proj);
                                    return (
                                        <div key={proj.id} className="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden hover:shadow-2xl transition-all group relative border-r-8 border-r-indigo-500 text-right">
                                            <div className="p-8 md:p-12 flex flex-col md:flex-row gap-8">
                                                <div className="flex-1">
                                                    <div className="flex items-center gap-4 mb-4">
                                                        <span className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${
                                                            proj.type === 'Heavy' ? 'bg-orange-100 text-orange-600 shadow-sm border border-orange-200' : 
                                                            proj.type === 'Standard' ? 'bg-blue-100 text-blue-600 shadow-sm border border-blue-200' : 
                                                            'bg-slate-100 text-slate-600 shadow-sm border border-slate-200'
                                                        }`}>{proj.type} Project</span>
                                                        <h3 className="text-3xl font-black text-slate-800 tracking-tight">{proj.name}</h3>
                                                    </div>
                                                    <p className="text-slate-400 font-bold text-sm mb-10 flex items-center gap-2 italic opacity-80">
                                                        <Icon name="users" size={16} /> العميل: {proj.client}
                                                    </p>
                                                    
                                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                                        <div className="bg-indigo-50/50 p-6 rounded-[2rem] border border-indigo-100 shadow-inner group-hover:bg-indigo-50 transition-colors">
                                                            <span className="block text-[10px] text-indigo-400 font-black uppercase mb-3 tracking-widest">المطور (أنت)</span>
                                                            <span className="text-2xl font-black text-indigo-900">${analysis.roleTotals['Developer']?.toLocaleString()}</span>
                                                        </div>
                                                        <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 shadow-inner group-hover:bg-white transition-colors">
                                                            <span className="block text-[10px] text-slate-400 font-black uppercase mb-3 tracking-widest">فريق التنفيذ</span>
                                                            <span className="text-2xl font-black text-slate-800">${analysis.roleTotals['Functional']?.toLocaleString()}</span>
                                                        </div>
                                                        <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 shadow-inner group-hover:bg-white transition-colors">
                                                            <span className="block text-[10px] text-slate-400 font-black uppercase mb-3 tracking-widest">مبيعات وإدارة</span>
                                                            <span className="text-2xl font-black text-slate-800">${(analysis.roleTotals['PM'] + analysis.roleTotals['Sales'])?.toLocaleString()}</span>
                                                        </div>
                                                        <div className="bg-emerald-50 p-6 rounded-[2rem] border border-emerald-100 shadow-inner group-hover:bg-emerald-100/30 transition-colors">
                                                            <span className="block text-[10px] text-emerald-600/60 font-black uppercase mb-3 tracking-widest">إجمالي العقد</span>
                                                            <span className="text-2xl font-black text-emerald-700">${Number(proj.value).toLocaleString()}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex flex-row md:flex-col justify-center items-center gap-4 md:border-r md:pr-10 border-slate-100">
                                                    <button className="p-5 bg-slate-50 text-slate-400 hover:bg-indigo-600 hover:text-white rounded-[1.5rem] transition-all shadow-sm hover:shadow-indigo-200 active:scale-90">
                                                        <Icon name="settings" size={24} />
                                                    </button>
                                                    <button 
                                                        onClick={() => deleteProject(proj.id)}
                                                        className="p-5 bg-red-50 text-red-400 hover:bg-red-600 hover:text-white rounded-[1.5rem] transition-all shadow-sm hover:shadow-red-200 active:scale-90"
                                                    >
                                                        <Icon name="trash-2" size={24} />
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>

                    {/* New Project Modal */}
                    {isAdding && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-50 flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white w-full max-w-5xl rounded-[3.5rem] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300 my-auto text-right">
                                <div className="p-8 md:p-16 max-h-[90vh] overflow-y-auto custom-scrollbar">
                                    <div className="flex justify-between items-center mb-12">
                                        <div>
                                            <h2 className="text-4xl font-black text-slate-800 tracking-tight">إضافة مشروع جديد</h2>
                                            <p className="text-slate-400 mt-2 font-bold italic text-base">سيتم حفظ البيانات ومشاركتها مع الفريق تلقائياً</p>
                                        </div>
                                        <button onClick={() => setIsAdding(false)} className="text-slate-300 hover:text-slate-800 transition-colors p-2 rounded-full hover:bg-slate-100">
                                            <Icon name="chevron-left" size={48} />
                                        </button>
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-16">
                                        <div className="space-y-10">
                                            <div className="group">
                                                <label className="block text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">اسم المشروع بالكامل</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="مثلاً: تطبيق أودو لمجموعة الشايع"
                                                    value={newProject.name}
                                                    onChange={(e) => setNewProject({...newProject, name: e.target.value})}
                                                    className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-[2rem] p-6 text-xl font-bold transition-all shadow-inner text-right"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">اسم العميل المستهدف</label>
                                                <input 
                                                    type="text" 
                                                    placeholder="الشركة القابضة..."
                                                    value={newProject.client}
                                                    onChange={(e) => setNewProject({...newProject, client: e.target.value})}
                                                    className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-[2rem] p-6 font-bold shadow-inner text-right"
                                                />
                                            </div>
                                            <div className="grid grid-cols-2 gap-8">
                                                <div>
                                                    <label className="block text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">قيمة العقد ($)</label>
                                                    <div className="relative">
                                                        <span className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 font-black text-lg">$</span>
                                                        <input 
                                                            type="number" 
                                                            value={newProject.value}
                                                            onChange={(e) => setNewProject({...newProject, value: Number(e.target.value)})}
                                                            className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-[2rem] p-6 pl-12 font-black text-2xl shadow-inner text-indigo-600 text-right"
                                                        />
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="block text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">تصنيف المشروع</label>
                                                    <select 
                                                        value={newProject.type}
                                                        onChange={(e) => setNewProject({...newProject, type: e.target.value})}
                                                        className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-500 focus:bg-white rounded-[2rem] p-6 font-bold cursor-pointer shadow-inner appearance-none text-right"
                                                    >
                                                        <option value="Standard">Standard (تجهيز)</option>
                                                        <option value="Custom">Custom (متوازن)</option>
                                                        <option value="Heavy">Heavy (تطوير مكثف)</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-slate-50 p-10 rounded-[3rem] border border-slate-100 shadow-inner">
                                            <div className="flex justify-between items-center mb-8">
                                                <label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest">نطاق العمل (SOW)</label>
                                                <span className="text-[10px] bg-indigo-600 text-white px-4 py-1.5 rounded-full font-black shadow-lg shadow-indigo-200">النموذج الذكي</span>
                                            </div>
                                            <div className="space-y-4 max-h-[22rem] overflow-y-auto pr-3 custom-scrollbar text-right">
                                                {BASE_TASKS.map(t => (
                                                    <label key={t.id} className="flex items-center gap-5 p-5 bg-white rounded-[1.5rem] border border-slate-100 cursor-pointer hover:border-indigo-400 transition-all group shadow-sm hover:shadow-md">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={newProject.tasks[t.id]}
                                                            onChange={() => setNewProject({
                                                                ...newProject, 
                                                                tasks: {...newProject.tasks, [t.id]: !newProject.tasks[t.id]}
                                                            })}
                                                            className="w-7 h-7 text-indigo-600 rounded-xl cursor-pointer focus:ring-offset-0 focus:ring-0 border-slate-200"
                                                        />
                                                        <div className="flex-1">
                                                            <span className="block text-base font-black text-slate-700 group-hover:text-indigo-600 transition-colors">{t.label}</span>
                                                            <span className="text-[10px] text-slate-400 font-black uppercase">{t.category}</span>
                                                        </div>
                                                        <span className={`text-[10px] px-3 py-1.5 rounded-xl font-black uppercase tracking-tighter ${
                                                            t.role === 'Developer' ? 'bg-purple-50 text-purple-600 border border-purple-100' : 
                                                            t.role === 'Functional' ? 'bg-blue-50 text-blue-600 border border-blue-100' : 
                                                            'bg-slate-100 text-slate-400 border border-slate-200'
                                                        }`}>{t.role}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-16 flex flex-col md:flex-row gap-6">
                                        <button 
                                            onClick={handleSaveProject}
                                            className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-black py-6 rounded-[2.5rem] shadow-2xl shadow-indigo-300 transition-all flex items-center justify-center gap-4 active:scale-95 text-xl"
                                        >
                                            <Icon name="save" size={28} />
                                            <span>اعتماد وحفظ المشروع سحابياً</span>
                                        </button>
                                        <button 
                                            onClick={() => setIsAdding(false)}
                                            className="px-12 bg-slate-100 text-slate-400 font-bold py-6 rounded-[2.5rem] hover:bg-slate-200 transition-all active:scale-95 border border-slate-200"
                                        >
                                            تراجع
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
